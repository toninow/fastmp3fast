# FASTMP3FAST frontend (SPA)
Alias /fastmp3fast /var/www/html/fastmp3fast/frontend/dist
<Directory /var/www/html/fastmp3fast/frontend/dist>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    RewriteEngine On
    RewriteBase /fastmp3fast/
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ index.html [L]
</Directory>

# FASTMP3FAST API (FastAPI on 127.0.0.1:8001)
ProxyPreserveHost On
ProxyPass /fastmp3fast/api/ http://127.0.0.1:8001/api/
ProxyPassReverse /fastmp3fast/api/ http://127.0.0.1:8001/api/
ProxyPass /fastmp3fast/up http://127.0.0.1:8001/up
ProxyPassReverse /fastmp3fast/up http://127.0.0.1:8001/up
